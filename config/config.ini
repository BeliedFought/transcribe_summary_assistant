[app]
name = Transcribe & Summary Assistant
version = 0.7.0
language = ru

[processing]
audio_extensions = .mp3,.wav,.flac,.ogg,.m4a,.opus
video_extensions = .mp4,.webm,.mkv,.mov,.avi
text_extensions = .txt
; Режим работы:
;   full          - полная обработка (транскрибация, диаризация, саммаризация)
;   download_only - YouTube-ссылки из input/yt/ скачиваются как видео в output/YouTube/
;                   без обработки; локальные файлы из input/audio и input/video
;                   обрабатываются обычным пайплайном
mode = download_only

[whisper]
model_size = large-v3
device = cuda
compute_type = float16
language = ru
vad_filter = true
vad_min_speech_duration_ms = 1000
vad_max_speech_duration_s = 30
beam_size = 5

[diarization]
enabled = true
min_speakers = 1
max_speakers = 10
hf_model = pyannote/speaker-diarization-3.1

[youtube]
audio_format = bestaudio/best
output_template = %(id)s_%(title)s.%(ext)s
download_template = %(channel)s - %(title)s.%(ext)s
; Папка для скачивания видео. Используется только в режиме download_only.
; Абсолютный путь (~ раскрывается в домашнюю папку) либо относительный от корня проекта.
; В режиме full параметр игнорируется - аудио для обработки качается во временную папку
download_folder = ~/Downloads

[deepseek]
api_url = https://api.deepseek.com/v1
model = deepseek-chat
temperature = 0.3
max_tokens = 4096
timeout = 60

[ollama]
enabled = false
base_url = http://localhost:11434
model = llama3
timeout = 60

[paths]
data_folder = data/
input_folder = input/
output_folder = output/
log_folder = log/

[retry]
count = 3
delay = 2
max_delay = 30

[email]
enabled = true
smtp_host = smtp.yandex.ru
smtp_port = 465
smtp_security = ssl
from = noreply@assist.ru
to = user@domain.com
subject_summary = Краткий пересказ - {channel} - {title}
subject_article = Статья - {title}
attach_markdown = true

[output]
generate_summary = true
generate_article = true
